<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#ff006e" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="slGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb5607;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- S shape -->
  <path d="M 55 60 Q 55 45, 70 45 Q 85 45, 85 55 Q 85 65, 70 70 Q 55 75, 55 85 Q 55 100, 70 105 Q 85 110, 85 120 Q 85 135, 70 135 Q 55 135, 55 125" 
        fill="none" stroke="url(#slGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- L shape -->
  <path d="M 115 45 L 115 125 Q 115 135, 125 135 L 145 135" 
        fill="none" stroke="url(#slGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent line -->
  <line x1="50" y1="155" x2="150" y2="155" stroke="#ff006e" stroke-width="2" opacity="0.5"/>
</svg>